name: Quant Quality Check
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install Bandit
      run: pip install bandit
    - name: Security Scan
      # Scans code for vulnerabilities (like hardcoded keys)
      run: bandit -r . -x ./venv